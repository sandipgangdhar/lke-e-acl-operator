# 02-secret.example.yaml
#
# Example Kubernetes Secret for storing the Linode API token.
#
# IMPORTANT:
# - Do not commit real tokens to GitHub.
# - Copy this file to secret.yaml.
# - Replace REPLACE_ME with a valid Linode API token.
# - Keep secret.yaml ignored through .gitignore.
#
# © LKE-E ACL Operator | Developed by Sandip Gangdhar | 2026
---
apiVersion: v1
kind: Secret
metadata:
  # Secret consumed by the ACL Agent and Reconciler.
  name: linode-api-secret
  namespace: lke-acl-operator

# Opaque Secret stores arbitrary key-value data.
type: Opaque

stringData:
  # Linode API token used to read/update LKE-E Control Plane ACL.
  # Replace only in local secret.yaml. Do not commit real token.
  LINODE_TOKEN: "REPLACE_ME"
